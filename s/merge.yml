    include-all: true
    filter: (?i)🌟
    type: select
  - name: 🪬 手动切换
    include-all: true
    type: select
  - name: ♻️ 自动选择
    type: url-test
    include-all: true
    interval: 300
    tolerance: 100
  - name: 🛑 广告拦截
