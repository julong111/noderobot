      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    TLS:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080-8888
      priority-domain-vendors:
        - google
        - youtube
    QUIC:
      ports:
        - 443
