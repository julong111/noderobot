sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    TLS:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080-8888
      priority-domain-vendors:
        - google
        - youtube
    QUIC:
      ports:
        - 443
proxy-groups:
  - name: 🚀 代理
    type: select
    proxies:
      - 🌟 手工精选
      - 🔧 我的规则
      - 🪬 手动切换
      - ♻️ 自动选择
      - DIRECT
  - name: UpdateTimestamp
    include-all: true
    filter: (?i)Timestamp
    type: select
  - name: 🔧 我的规则
    include-all: true
    filter: (?i)🌟|新加坡|坡|狮城|SG|Singapore|美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States|韩国|韩|KR|France|法国|Paris|Netherlands
    type: select
  - name: 🌟 手工精选
    include-all: true
    filter: (?i)🌟
    type: select
  - name: 🪬 手动切换
    include-all: true
    type: select
  - name: ♻️ 自动选择
    type: url-test
    include-all: true
    interval: 300
    tolerance: 100
  - name: 🛑 广告拦截
    type: select
    proxies:
      - REJECT
  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
